<!DOCTYPE html>
<html>
    <head>
        <title>Columns Assignment</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <table>
            <colgroup>
                <col class="pet" width="50%" style="border-right: 5px solid black; border-left: 5px solid black;">
                <col class="stock" width="25%" style="border-right: 5px solid black; border-left: 5px solid black;">
                <col class="price" width="25%" style="border-right: 5px solid black; border-left: 5px solid black;">
            </colgroup>
        
           <thead>
            <tr>
                <th>pet</th>
                <th>price</th>
                <th>stock</th>
            </tr>
          </thead>
           <tbody>
            <tr>
                <td>dog</td>
                <td>$500</td>
                <td>5</td>
            </tr>
            <tr>
                <td>cat</td>
                <td>$300</td>
                <td>10</td>
            </tr>
            <tr>
                <td>fish</td>
                <td>$50</td>
                <td>20</td>
            </tr>
        </tbody>
        </table>
    </body>
</html>
