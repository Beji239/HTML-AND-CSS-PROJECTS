<!DOCTYPE html>
<html>

<head>
    <title>Creating effects with css</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!--NAVBAR-->
    <nav class="nav-bar">
        <ul>
            <li><a href="#">Home</a></li>
            <li class="drop">
                <a href="#">Images</a>
                <div class="rollover-menu">
                    <a href="#image1">Image1</a>
                    <a href="#image2">Image2</a>
                    <a href="#image3">Image3</a>
                </div>
            </li>
        </ul>
    </nav>
    <section>
        <!--Image1-->
        <div class="image-container" id="image1">
            <img src="images/image1.jfif">
            <div class="overlay"></div>
        </div>
        <div class="image-container" id="image2">
            <img src="images/image2.jfif" class="zoom">
        </div>
        <div class="image-container" id="image3">
            <div class="circle">
                <img src="images/image3.jfif">
            </div>
        </div>
    </section>
    <!--FOOTER-->
    <footer class="footer-text">

    </footer>
