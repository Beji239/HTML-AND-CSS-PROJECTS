<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    main {
      flex: 1;
      padding: 20px;
    }

    /* Footer styling */
    footer {
      /* Center all text inside the footer */
      text-align: center;
      
      /* Make all text bold */
      font-weight: bold;
      
      /* Some extra styling so you can actually see it */
      background-color: #333;
      color: #fff;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Page Content</h1>
    <p>This is the main content area. The footer will stick to the bottom.</p>
  </main>

  <footer>
    <p>&copy; 2026 Behzad Ra. All rights reserved.</p>
    <p>Contact: hello@example.com</p>
  </footer>
</body>
</html>
