<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Overlay Fade Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f172a;
      font-family: Arial, sans-serif;
    }

    /* Container holds image + overlay */
    .overlay-container {
      position: relative;
      width: 600px;
      max-width: 90%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .overlay-container img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* The overlay layer */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      
      /* Start invisible */
      opacity: 0;
      
      /* Background color for overlay */
      background-color: rgba(15, 23, 42, 0.9);
      
      /* Smooth fade transition */
      transition: opacity 0.4s ease;
      
      /* Center the text inside overlay */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    /* Fade in overlay on hover */
    .overlay-container:hover .overlay {
      opacity: 1;
    }

    .overlay h3 {
      color: #60a5fa;
      font-size: 2rem;
      margin: 0 0 12px 0;
    }

    .overlay p {
      color: #e2e8f0;
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 80%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <img 
      src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=600" 
      alt="Cybersecurity lock and code concept">
    
    <div class="overlay">
      <h3>Zero Trust Security</h3>
      <p>
        Never trust, always verify. Every user and device must be authenticated 
        and authorized before accessing network resources, regardless of location.
      </p>
    </div>
  </div>
</body>
</html>
