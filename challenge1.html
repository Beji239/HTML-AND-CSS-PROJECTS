<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Styling Challenge</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
    }

    .styled-image {
      /* 1. Image is centered using flex on the parent body */
      
      /* 2. Apply a CSS filter - this one adds contrast and a slight sepia tone */
      filter: contrast(1.1) sepia(0.2);
      
      /* 3. Give the image rounded edges */
      border-radius: 16px;
      
      /* Bonus: Keep it responsive */
      max-width: 80%;
      height: auto;
      
      /* Bonus: Smooth transition if you hover to change filters */
      transition: filter 0.3s ease;
    }

    .styled-image:hover {
      filter: contrast(1.2) sepia(0) grayscale(0.1);
    }
  </style>
</head>
<body>
  <img 
    class="styled-image"
    src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600" 
    alt="Mountain landscape">
</body>
</html>
